name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Set up Java (for Android build)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash from resources/
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Copy custom AndroidManifest
        run: cp src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Override splash / launch background colour (match login green, remove purple)
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          mkdir -p "$(dirname "$COLORS_FILE")"
          cat > "$COLORS_FILE" << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <!-- Login-screen green — replaces the default Capacitor purple splash -->
              <color name="colorPrimary">#0d2e18</color>
              <color name="colorPrimaryDark">#0a1f0f</color>
              <color name="colorAccent">#2d9e6b</color>
              <color name="ic_launcher_background">#0d2e18</color>
          </resources>
          COLORS_EOF

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK output
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/act-shopkeeper.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: act-shopkeeper
          path: apk-output/act-shopkeeper.apk
          retention-days: 90
