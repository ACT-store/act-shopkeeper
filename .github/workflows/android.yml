name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite app
        run: npm run build

      - name: Set up Java (for Android build)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icons and splash from resources/
        run: |
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Copy custom AndroidManifest
        run: cp src/main/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Override splash / launch background colour (match login green, remove purple)
        run: |
          mkdir -p android/app/src/main/res/values
          mkdir -p android/app/src/main/res/values-night

          # colors.xml — all theme colours set to login green
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="colorPrimary">#0d2e18</color>' \
            '    <color name="colorPrimaryDark">#0a1f0f</color>' \
            '    <color name="colorAccent">#2d9e6b</color>' \
            '    <color name="appBackground">#0d2e18</color>' \
            '</resources>' > android/app/src/main/res/values/colors.xml

          # ic_launcher_background — separate file to avoid duplicate resource error
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="ic_launcher_background">#0d2e18</color>' \
            '</resources>' > android/app/src/main/res/values/ic_launcher_background.xml

          # values-night/colors.xml — dark mode also gets login green, not system purple
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <color name="colorPrimary">#0d2e18</color>' \
            '    <color name="colorPrimaryDark">#0a1f0f</color>' \
            '    <color name="colorAccent">#2d9e6b</color>' \
            '    <color name="appBackground">#0d2e18</color>' \
            '</resources>' > android/app/src/main/res/values-night/colors.xml

          # styles.xml — override AppTheme windowBackground so the very first native
          # frame Android draws before the WebView paints is login green, not purple/white
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' \
            '<resources>' \
            '    <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">' \
            '        <item name="android:windowBackground">@color/appBackground</item>' \
            '        <item name="android:statusBarColor">@color/colorPrimaryDark</item>' \
            '        <item name="android:navigationBarColor">@color/colorPrimary</item>' \
            '        <item name="colorPrimary">@color/colorPrimary</item>' \
            '        <item name="colorPrimaryDark">@color/colorPrimaryDark</item>' \
            '        <item name="colorAccent">@color/colorAccent</item>' \
            '    </style>' \
            '</resources>' > android/app/src/main/res/values/styles.xml

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Prepare APK output
        run: |
          mkdir -p apk-output
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             apk-output/act-shopkeeper.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: act-shopkeeper
          path: apk-output/act-shopkeeper.apk
          retention-days: 90
